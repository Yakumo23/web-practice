<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stopwatch</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p id="timer">00:00:00</p>
    <div class="button-area">
        <button id="startbtn" class="btn start" type="button">スタート</button>
        <button id="stopbtn" class="btn stop" type="button">ストップ</button>
        <button id="risetbtn" class="btn reset" type="button">リセット</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
